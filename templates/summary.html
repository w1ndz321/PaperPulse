<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f7ff;
            --card-bg: #ffffff;
            --text: #1e3a5f;
            --muted: #5a7a9a;
            --accent: #0066cc;
            --accent-light: #3399ff;
            --accent-soft: #cce5ff;
            --border: #d0e4f7;
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: linear-gradient(180deg, var(--bg) 0%, #e8f4ff 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* === Hero Title === */
        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.125rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.35;
            color: var(--text);
            background: linear-gradient(135deg, var(--text) 0%, #2d5a87 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === TL;DR Card === */
        .tldr-card {
            background: linear-gradient(135deg, #e6f3ff 0%, #f5faff 50%, #cce8ff 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 2px 12px rgba(0, 102, 204, 0.08);
        }

        .tldr-card::before {
            content: 'TL;DR';
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.08em;
            position: absolute;
            top: 0.875rem;
            left: 1.5rem;
            background: rgba(255,255,255,0.8);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
        }

        .tldr-content {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
            padding-top: 0.75rem;
        }

        /* === Info Grid === */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .info-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            min-width: 0;
            box-sizing: border-box;
            transition: max-height 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            max-height: 78px;
            overflow: hidden;
        }

        .info-item:hover {
            border-color: var(--accent-soft);
            box-shadow: 0 4px 16px rgba(0, 102, 204, 0.12);
            z-index: 10;
            max-height: 300px;
        }

        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            margin-bottom: 0.375rem;
        }

        .info-value {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.4;
            max-width: 100%;
            word-break: break-word;
        }

        .info-link {
            color: var(--accent);
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-all;
        }

        .info-link:hover {
            text-decoration: underline;
        }

        /* === Divider - 渐变边框 === */
        .divider-section {
            margin: 3rem 0 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .divider-line {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent-light) 70%, transparent 100%);
            border-radius: 1px;
        }

        .divider-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--accent);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.35; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* === Prose === */
        .prose h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.375rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.875rem;
            color: var(--accent);
            padding-bottom: 0.375rem;
            border-bottom: 1px solid var(--accent-soft);
        }

        .prose h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.0625rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.625rem;
            color: var(--accent-light);
        }

        .prose p {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 1rem;
            text-align: justify;
        }

        .prose ul, .prose ol {
            margin-bottom: 1rem;
            padding-left: 1.25rem;
        }

        .prose li {
            margin-bottom: 0.5rem;
            line-height: 1.65;
        }

        .prose li::marker {
            color: var(--accent);
        }

        .prose blockquote {
            background: rgba(0, 102, 204, 0.06);
            border-left: 2px solid var(--accent);
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: 0 6px 6px 0;
            color: var(--muted);
            font-style: italic;
        }

        .prose code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.125rem 0.375rem;
            border-radius: 3px;
            font-size: 0.85rem;
        }

        .prose pre {
            font-family: 'JetBrains Mono', monospace;
            background: #1a365d;
            color: #bee3f8;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .prose pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .prose strong {
            font-weight: 600;
            color: var(--accent);
        }

        .prose a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
        }

        .prose a:hover {
            border-bottom: 1px solid var(--accent);
        }

        /* === Sidebar === */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
        }

        .toc-link {
            display: block;
            padding: 0.375rem 0.75rem;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8125rem;
            font-weight: 500;
            border-left: 2px solid transparent;
            border-radius: 0 4px 4px 0;
            transition: all 0.15s ease;
        }

        .toc-link:hover {
            color: var(--accent);
            background: rgba(0, 102, 204, 0.06);
        }

        .toc-link.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: var(--accent-soft);
            font-weight: 600;
        }

        .toc-link.h3 {
            font-size: 0.75rem;
            padding-left: 1.25rem;
            font-weight: 400;
        }

        /* === Scroll Hint === */
        .scroll-hint {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: var(--accent);
            text-align: center;
            margin-top: 2rem;
            animation: float 2s ease-in-out infinite;
        }

        .scroll-hint-arrow {
            display: inline-block;
            margin-top: 0.25rem;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes float {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #90cdf4; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* === Footer === */
        .footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            margin-top: 2rem;
        }

        .footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--muted);
            text-align: center;
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .info-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Sidebar -->
    <nav class="sidebar fixed left-0 top-0 h-screen w-56 p-5 overflow-y-auto hidden lg:block">
        <div class="sticky top-4">
            <!-- Logo -->
            <div class="flex items-center gap-2 mb-8">
                <span class="text-2xl">🐻‍❄️</span>
                <svg viewBox="0 0 16 16" class="w-5 h-5 -ml-1" fill="none">
                    <circle cx="6" cy="6" r="4" stroke="#0066cc" stroke-width="1.5" fill="none"/>
                    <line x1="9.5" y1="9.5" x2="14" y2="14" stroke="#0066cc" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="6" cy="6" r="1.5" fill="#0066cc" opacity="0.3"/>
                </svg>
                <span class="font-['Outfit'] font-semibold text-sm text-[var(--text)]">PaperPulse</span>
            </div>

            <p class="font-['JetBrains_Mono'] text-xs text-[var(--muted)] uppercase tracking-widest mb-3">Contents</p>
            <ul id="toc-list" class="space-y-1"></ul>
        </div>
    </nav>

    <!-- Main -->
    <main class="lg:ml-56">
        <article class="max-w-4xl mx-auto px-8 py-12 lg:py-16">

            <!-- Header -->
            <header class="mb-4">
                <div class="flex items-center gap-2">
                    <span class="font-['JetBrains_Mono'] text-xs text-[var(--accent)] bg-[var(--accent-soft)] px-2 py-0.5 rounded">PAPER</span>
                    <span class="font-['JetBrains_Mono'] text-xs text-[var(--muted)]">{{ date }}</span>
                </div>
            </header>

            <!-- Hero -->
            <section class="mb-6">
                <h1 class="hero-title mb-6" id="hero-title">{{ title }}</h1>

                <div class="tldr-card mb-5">
                    <p class="tldr-content" id="tldr-content">Loading...</p>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <p class="info-label">PAPER</p>
                        <div class="info-value" id="paper-links">-</div>
                    </div>
                    <div class="info-item">
                        <p class="info-label">CODE</p>
                        <div class="info-value" id="code-links">-</div>
                    </div>
                    <div class="info-item">
                        <p class="info-label">AUTHORS</p>
                        <p class="info-value" id="paper-authors">-</p>
                    </div>
                    <div class="info-item">
                        <p class="info-label">KEYWORDS</p>
                        <p class="info-value" id="paper-keywords">-</p>
                    </div>
                </div>

                <div class="scroll-hint">
                    <span>scroll down to read...</span>
                    <span class="scroll-hint-arrow">↓</span>
                </div>
            </section>

            <!-- Divider - 渐变边框 -->
            <div class="divider-section">
                <div class="divider-line"></div>
                <span class="divider-text">DETAILED ANALYSIS</span>
                <div class="divider-line"></div>
            </div>

            <!-- Content -->
            <section class="prose" id="content">
                {{ content }}
            </section>

            <!-- Footer -->
            <footer class="footer">
                <p class="footer-text">Generated by PaperPulse Lite</p>
            </footer>

        </article>
    </main>

    <script>
        const content = document.getElementById('content');
        const html = content.innerHTML;

        // === 隐藏content中重复的h1标题 ===
        const firstH1 = content.querySelector('h1');
        if (firstH1) {
            firstH1.style.display = 'none';
        }

        // === TL;DR - 找h2后面的所有内容，拼接后提取 ===
        const tldrH2 = content.querySelector('h2');
        if (tldrH2 && tldrH2.textContent.toLowerCase().includes('tl;dr')) {
            // 收集h2后面所有p的内容，跳过h3标题本身
            let tldrText = '';
            let nextEl = tldrH2.nextElementSibling;
            while (nextEl && nextEl.tagName !== 'H2') {
                if (nextEl.tagName === 'P') {
                    tldrText += nextEl.textContent.trim() + ' ';
                }
                nextEl = nextEl.nextElementSibling;
            }
            if (tldrText) {
                document.getElementById('tldr-content').textContent = tldrText.trim().substring(0, 350);
            }
        }

        // === 提取论文基本信息（并隐藏该章节）===
        const headings = content.querySelectorAll('h2');
        let infoH2 = null;
        headings.forEach(h => {
            if (h.textContent.includes('论文基本信息') || h.textContent.includes('论文链接') || h.textContent.toLowerCase().includes('info')) {
                infoH2 = h;
            }
        });

        if (infoH2) {
            // 隐藏整个"论文基本信息"章节
            let current = infoH2.nextElementSibling;
            while (current && current.tagName !== 'H2') {
                current.style.display = 'none';
                current = current.nextElementSibling;
            }

            // === PAPER / CODE: 区分论文链接和代码链接 ===
            const paperLinksContainer = document.getElementById('paper-links');
            const codeLinksContainer = document.getElementById('code-links');
            let paperHtml = '';
            let codeHtml = '';

            // 先按h3区分
            const codeH3 = Array.from(content.querySelectorAll('h3')).find(h => h.textContent.includes('代码'));
            const paperH3 = Array.from(content.querySelectorAll('h3')).find(h => h.textContent.includes('论文链接'));

            if (paperH3) {
                let el = paperH3.nextElementSibling;
                while (el && el.tagName !== 'H3' && el.tagName !== 'H2') {
                    const links = el.querySelectorAll('a');
                    links.forEach(a => {
                        const url = a.getAttribute('href');
                        if (url && url.startsWith('http')) {
                            const label = a.textContent.trim();
                            paperHtml += `<a href="${url}" target="_blank" class="info-link">${label || url}</a>`;
                        }
                    });
                    // 也检查纯文本URL
                    if (!links.length) {
                        const urlMatches = el.textContent.match(/https?:\/\/[^\s]+/g);
                        if (urlMatches) {
                            urlMatches.forEach(url => paperHtml += `<a href="${url}" target="_blank" class="info-link">${url}</a>`);
                        }
                    }
                    el = el.nextElementSibling;
                }
            }

            if (codeH3) {
                let el = codeH3.nextElementSibling;
                while (el && el.tagName !== 'H3' && el.tagName !== 'H2') {
                    const links = el.querySelectorAll('a');
                    links.forEach(a => {
                        const url = a.getAttribute('href');
                        if (url && url.startsWith('http')) {
                            const label = a.textContent.trim();
                            codeHtml += `<a href="${url}" target="_blank" class="info-link">${label || url}</a>`;
                        }
                    });
                    if (!links.length) {
                        const urlMatches = el.textContent.match(/https?:\/\/[^\s]+/g);
                        if (urlMatches) {
                            urlMatches.forEach(url => codeHtml += `<a href="${url}" target="_blank" class="info-link">${url}</a>`);
                        }
                    }
                    el = el.nextElementSibling;
                }
            }

            // 如果没有分h3，则按URL特征自动分类
            if (!paperHtml && !codeHtml) {
                const allLinks = content.querySelectorAll('a');
                allLinks.forEach(a => {
                    const url = a.getAttribute('href') || '';
                    const label = a.textContent.trim();
                    if (url.startsWith('http')) {
                        if (url.includes('github.com') || url.includes('gitlab.com') || url.includes('huggingface.co')) {
                            codeHtml += `<a href="${url}" target="_blank" class="info-link">${label || url}</a>`;
                        } else {
                            paperHtml += `<a href="${url}" target="_blank" class="info-link">${label || url}</a>`;
                        }
                    }
                });
            }

            if (paperHtml) paperLinksContainer.innerHTML = paperHtml;
            if (codeHtml) codeLinksContainer.innerHTML = codeHtml;

            // === AUTHORS: 机构+前3作者 ===
            const authorH = Array.from(content.querySelectorAll('h2, h3')).find(h => h.textContent.includes('作者'));
            const authorContainer = document.getElementById('paper-authors');
            if (authorH) {
                const nextEl = authorH.nextElementSibling;
                if (nextEl) {
                    const authorLis = nextEl.querySelectorAll('li');
                    if (authorLis.length > 0) {
                        const authors = Array.from(authorLis).map(li => li.textContent.trim()).slice(0, 3);
                        authorContainer.textContent = authors.join(', ');
                    } else {
                        // 纯文本：提取机构行和前3个作者
                        const rawText = nextEl.textContent.trim();
                        const parts = rawText.split(/[,，;；\n]/);
                        const top3 = parts.slice(0, 3).join(', ');
                        authorContainer.textContent = top3;
                    }
                }
            }

            // === KEYWORDS ===
            const keywordH = Array.from(content.querySelectorAll('h2, h3')).find(h => h.textContent.includes('关键词'));
            const keywordContainer = document.getElementById('paper-keywords');
            if (keywordH) {
                const nextEl = keywordH.nextElementSibling;
                if (nextEl) {
                    const keywordLis = nextEl.querySelectorAll('li');
                    let fullKeywords = '';
                    if (keywordLis.length > 0) {
                        fullKeywords = Array.from(keywordLis).map(li => li.textContent.trim()).join(', ');
                    } else {
                        fullKeywords = nextEl.textContent.trim();
                    }
                    keywordContainer.textContent = fullKeywords;
                }
            }
        }

        // === TOC ===
        const tocList = document.getElementById('toc-list');

        // Brief 条目 - 指向顶部hero区域
        const heroSection = document.querySelector('section.mb-6');
        if (heroSection) {
            heroSection.id = 'brief';
            const briefLi = document.createElement('li');
            const briefA = document.createElement('a');
            briefA.href = '#brief';
            briefA.textContent = 'Brief';
            briefA.className = 'toc-link';
            briefLi.appendChild(briefA);
            tocList.appendChild(briefLi);
        }

        const allHeadings = content.querySelectorAll('h2, h3');
        const exclude = ['tl;dr', '论文基本信息', '论文链接'];

        allHeadings.forEach((h, i) => {
            const text = h.textContent.toLowerCase();
            if (exclude.some(e => text.includes(e.toLowerCase()))) {
                h.style.display = 'none';
                let current = h.nextElementSibling;
                while (current && current.tagName !== 'H2') {
                    current.style.display = 'none';
                    current = current.nextElementSibling;
                }
                return;
            }

            const id = `s-${i}`;
            h.id = id;

            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `#${id}`;
            a.textContent = h.textContent;
            a.className = `toc-link ${h.tagName === 'H3' ? 'h3' : ''}`;
            li.appendChild(a);
            tocList.appendChild(li);
        });

        // === Scroll Highlight ===
        const tocLinks = tocList.querySelectorAll('.toc-link');
        const highlight = () => {
            let current = null;
            // Brief高亮：当滚动在顶部时
            if (heroSection && heroSection.getBoundingClientRect().top > -50) {
                current = 'brief';
            }
            allHeadings.forEach(h => {
                if (h.id && h.getBoundingClientRect().top <= 100) current = h.id;
            });
            tocLinks.forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === `#${current}`);
            });
        };
        window.addEventListener('scroll', highlight, { passive: true });
        highlight();
    </script>
</body>
</html>
